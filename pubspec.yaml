name: onestopsolutions
description: "OneStopSolutions - Unified Staff & Shop Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.0.5
  # HTTP & Networking
  http: ^1.2.0
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # Location
  geolocator: ^14.0.2
  # UI
  flutter_svg: ^2.0.7
  fl_chart: ^0.64.0
  # Internationalization
  intl: ^0.20.2
  # Timezone
  timezone: ^0.9.2
  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo-icon.png

